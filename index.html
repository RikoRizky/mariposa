<!DOCTYPE html> 
<html lang="id"> 

<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Mariposa Tour - Indonesia</title> 
<!-- Fonts --> 
<link rel="preconnect" href="https://fonts.googleapis.com"> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> 
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"> 
<!-- GSAP Core --> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script> 

<style> 
:root { 
--bg-color: #ffffff; 
--text-color: #000000; 
--accent-color: #0088cc; 
} 

body, html { 
margin: 0; padding: 0; 
width: 100%; height: 100%; 
background-color: #1c1c1c; 
overflow: hidden; 
font-family: 'Segoe UI', sans-serif; 
} 

/* --- PRELOADER --- */ 
.wrapper { 
position: fixed; inset: 0; z-index: 99999; 
display: flex; flex-direction: column; align-items: center; justify-content: center; 
background: var(--bg-color); 
} 

.svg-container { 
width: 100%; 
height: 100%; 
display: flex; 
justify-content: center; 
align-items: center; 
} 

/* Responsif SVG */ 
@media (max-width: 768px) { 
.svg-container svg { 
width: 100%; 
height: auto; 
transform: scale(2.5); 
transform-origin: center; 
} 
.text-name { font-size: 45px !important; } 
.text-title { font-size: 30px !important; letter-spacing: 12px !important; } 
} 

.animated-content { 
transform-origin: 960px 540px; 
animation: cinematicReveal 2.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
opacity: 0; 
} 

.line-anim { 
opacity: 0; 
animation: growLine 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
animation-delay: 0.5s; 
} 

.text-slide-anim { 
opacity: 0; 
animation: slideRight 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
animation-delay: 0.8s; 
} 

.text-name { font-family: 'Raleway', sans-serif; font-weight: 900; font-size: 72px; fill: var(--text-color); } 
.text-title { font-family: 'Raleway', sans-serif; font-weight: 400; font-size: 24px; letter-spacing: 16px; fill: var(--accent-color); } 

@keyframes cinematicReveal { 
0% { transform: scale(1.5); opacity: 0; filter: blur(20px); } 
100% { transform: scale(1); opacity: 1; filter: blur(0px); } 
} 
@keyframes growLine { 
0% { transform: scaleY(0); opacity: 0; transform-origin: center; } 
100% { transform: scaleY(1); opacity: 1; transform-origin: center; } 
} 
@keyframes slideRight { 
0% { transform: translateX(-50px); opacity: 0; } 
100% { transform: translateX(0); opacity: 1; } 
} 

.flash-overlay { fill: #ffffff; animation: fadeOutFlash 1.5s ease-out forwards; } 
@keyframes fadeOutFlash { 0% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } } 

/* --- FLOW IMAGES --- */ 
.flow { 
height: 100vh; width: 100vw; 
position: fixed; top: 0; left: 0; 
background: #1c1c1c; 
overflow: hidden; 
visibility: hidden; 
} 

.flow-images { 
position: absolute; top: 0; left: 0; 
width: 100%; height: 100%; 
transform-style: preserve-3d; 
perspective: 2000px; 
} 

.flow .img { 
position: absolute; 
top: 50%; 
left: 50%; 
/* Menggunakan percent agar aman di mobile */
transform: translate(-50%, -50%); 
width: 500px; height: 350px; 
will-change: transform, opacity; 
} 

/* Ukuran gambar responsif */ 
@media (max-width: 1024px) { .flow .img { width: 400px; height: 280px; } } 
@media (max-width: 600px) { .flow .img { width: 280px; height: 200px; } } 

.flow .img img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; } 

/* Perbaikan Khusus Foto Terakhir (Cover) */
.flow .img.cover { 
width: 100% !important; 
height: 100% !important; 
z-index: 50;
} 
.flow .img.cover::after { 
content: ""; position: absolute; inset: 0; 
background: rgba(0, 0, 0, 0.4); 
} 

.section-text { 
position: absolute; top: 50%; left: 50%; 
transform: translate(-50%, -50%); 
z-index: 100; text-align: center; 
color: #ffffff; font-family: 'Instrument Serif', serif; 
width: 90%; pointer-events: none; 
} 

.section-text p { font-size: clamp(1.5rem, 5vw, 2.5rem); letter-spacing: 0.2em; opacity: 0; } 

/* --- OUTRO --- */ 
.outro { 
height: 100vh; width: 100vw; 
background: #e9e9e9; 
display: flex; align-items: center; justify-content: center; 
position: relative; z-index: 200; opacity: 0; 
} 

.outro h1 { 
font-family: 'Raleway', sans-serif; 
font-size: clamp(1.8rem, 8vw, 4rem); 
text-transform: uppercase; 
text-align: center; 
background: linear-gradient(135deg, #1c1c1c 0%, #4a4a4a 100%); 
-webkit-background-clip: text; 
-webkit-text-fill-color: transparent; 
} 
</style> 
</head> 

<body>

<!-- 3. OUTRO --> 
<div class="outro"> 
<h1>Welcome to Mariposa Tour</h1> 
</div> 

<script> 
window.addEventListener("load", () => { 
const master = gsap.timeline(); 

// 1. Preloader Fade Out
master.to("#preloader", { 
opacity: 0, 
duration: 1, 
delay: 2.8, 
onComplete: () => { 
document.getElementById("preloader").style.display = "none"; 
} 
}); 

// 2. Setup Flow Animation 
const images = gsap.utils.toArray('.flow .img'); 
const positions = [ 
{ x: -0.8, y: -0.6 }, { x: 0.7, y: 0.4 }, { x: -0.5, y: 0.7 }, 
{ x: 0.6, y: -0.5 }, { x: -0.8, y: 0.2 }, { x: 0.8, y: -0.3 }, 
{ x: -0.6, y: -0.8 }, { x: 0.4, y: 0.6 }, { x: -0.7, y: 0.5 }, 
{ x: 0.5, y: -0.7 }, { x: -0.4, y: -0.4 }, { x: 0.3, y: 0.8 }, 
{ x: -0.8, y: 0.3 }, { x: 0.6, y: 0.2 }, { x: -0.2, y: -0.7 }, 
{ x: 0.7, y: -0.6 }, { x: -0.5, y: 0.4 }, { x: 0.4, y: -0.4 }, 
{ x: -0.6, y: 0.6 }, { x: 0.8, y: 0.5 }, { x: -0.3, y: -0.5 }, 
{ x: 0.5, y: 0.3 }, { x: -0.7, y: -0.2 }, { x: 0.2, y: 0.7 }, 
{ x: -0.4, y: 0.8 }, { x: 0.6, y: -0.8 }, { x: -0.8, y: 0.1 }, 
{ x: 0, y: 0 } 
]; 

gsap.set(".flow", { visibility: "visible" }); 
// Inisialisasi posisi awal di tengah dengan xPercent/yPercent
gsap.set(images, { xPercent: -50, yPercent: -50, x: 0, y: 0, z: -5000, opacity: 0, scale: 0 }); 

const flowTl = gsap.timeline({ defaults: { ease: "power1.in" } }); 

flowTl.to(".flow .section-text p", { opacity: 1, duration: 1 }); 
flowTl.to(".flow .section-text", { opacity: 0, duration: 0.5, delay: 0.5 }); 

images.forEach((img, index) => { 
const isLast = index === images.length - 1; 

flowTl.to(img, { 
// Jika terakhir, tetap di -50% (Tengah). Jika bukan, sebar berdasarkan koordinat.
xPercent: isLast ? -50 : (positions[index].x * 150), 
yPercent: isLast ? -50 : (positions[index].y * 150), 
z: isLast ? 0 : 3000, 
opacity: 1, 
scale: 1, 
duration: 1.2 
}, ">-1.1"); 
}); 

// 3. Outro Reveal
flowTl.to(".outro", { 
opacity: 1, 
duration: 1, 
onStart: () => { 
document.body.style.overflowY = "auto"; 
document.body.style.overflowX = "hidden"; 
} 
}, "-=0.3"); 

master.add(flowTl); 
}); 
</script>
